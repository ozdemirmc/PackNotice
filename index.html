<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAKET HAZIRLIK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
</head>

<body>
    <div id="container" class="container">
        <header class="header">
            <h1>PAKET MAİLCİSİ</h1>
        </header>

        <main>
            <section class="section">
                <div style="display: flex; gap: 10px;">
                    <div style="flex: 1;">
                        <label class="section-title"></label>
                        <div class="radio-group">
                            <label class="radio-container"><input type="radio" name="bay" value="BAY-1"
                                    checked><span>BAY-1</span></label>
                            <label class="radio-container"><input type="radio" name="bay"
                                    value="BAY-2"><span>BAY-2</span></label>
                            <label class="radio-container"><input type="radio" name="bay"
                                    value="BAY-3"><span>BAY-3</span></label>
                        </div>
                    </div>
                </div>
            </section>

            <section class="section">
                <label class="section-title"></label>
                <div class="radio-stack">
                    <label class="radio-container"><input type="radio" name="type" value="planned" checked><span>PLANLI
                            BAKIM</span></label>
                    <label class="radio-container"><input type="radio" name="type" value="unplanned"><span>PLANSIZ
                            BAKIM</span></label>
                    <label class="radio-container"><input type="radio" name="type" value="periodic"><span>PERİYODİK
                            BAKIM</span></label>
                </div>
            </section>

            <section class="section">
                <div class="input-field"><label>UÇAK (A/C)</label><input type="text" id="txtAc" placeholder="TC-CHT">
                </div>
                <div class="input-field"><label>BAKIM ADI</label><input type="text" id="txtBakim" placeholder="A-CHECK">
                </div>
                <div class="input-field"><label>BAKIM GİRİŞ TARİHİ</label><input type="date" id="dateInput" lang="tr">
                </div>
            </section>

            <section id="skillSection" class="section">
                <label class="section-title">SKILL SEÇİMİ</label>
                <div id="skillGrid" class="checkbox-grid">
                    <label class="check-container"><input type="checkbox" id="chk30"
                            checked><span>30-MEKANİK</span></label>
                    <label class="check-container"><input type="checkbox" id="chk35" checked><span>35-KABİN
                            İÇİ</span></label>
                    <label class="check-container"><input type="checkbox" id="chk40"
                            checked><span>40-AVİYONİK</span></label>
                    <label class="check-container"><input type="checkbox" id="chk51"
                            checked><span>51-YAPISAL</span></label>
                    <label class="check-container"><input type="checkbox" id="chk52"
                            checked><span>52-BOYA</span></label>
                    <label class="check-container"><input type="checkbox" id="chk53"
                            checked><span>53-KOLTUK</span></label>
                    <label class="check-container"><input type="checkbox" id="chk98"
                            checked><span>98-BOROSKOP</span></label>
                    <label class="check-container"><input type="checkbox" id="chk99" checked><span>99-NDT</span></label>
                </div>
                <div id="plannerNote" class="info-note hidden">PLANNER modu aktif.</div>
            </section>

            <div style="margin-top: 10px;">
                <button id="btnPrepare" class="primary-button">MAİL HAZIRLA</button>
            </div>

            <div id="senderNote" class="sender-note">
                ⚠️ GÖNDERİCİ HESABI OLARAK <b style="color: var(--accent);">TT-UBB(SAW)-BAKIMHAZIRLIK</b> SEÇİLMELİDİR!
            </div>

            <div class="footer-links">
                <a href="#" id="linkAbout">HAKKINDA</a>
                <span>•</span>
                <a href="#" id="linkSettings">AYARLAR</a>
            </div>
        </main>

        <div id="alertOverlay" class="overlay hidden">
            <div class="modal" style="text-align: center;">
                <header class="modal-header" style="background: var(--accent);">
                    <h2 id="alertTitle" style="font-size: 11px; margin: 0; width: 100%;">⚠️ GÖNDEREN HESAP SEÇİMİ
                        UYARISI</h2>
                </header>
                <div class="modal-body" style="padding: 16px;">
                    <p id="alertMessage" style="font-size: 11px; line-height: 1.6; margin: 0;"></p>
                    <button id="btnAlertOk" class="primary-button"
                        style="margin-top: 10px; background: var(--accent);">TAMAM</button>
                </div>
            </div>
        </div>

        <!-- Sol taraftan kayan yan panel -->
        <div id="sidePanelBackdrop" class="side-backdrop hidden"></div>
        <div id="sidePanel" class="side-panel">
            <header class="side-panel-header">
                <h2 id="sidePanelTitle" style="font-size: 11px; margin: 0;">⚙️ AYARLAR</h2>
                <button id="btnClosePanel" class="icon-button" style="color: white;">✕</button>
            </header>

            <!-- AYARLAR İçeriği -->
            <div id="panelSettings" class="side-panel-body">
                <div class="setting-item">
                    <label>ZİMMET MODU</label>
                    <select id="selZimmetMode">
                        <option value="BIRIM">BİRİM</option>
                        <option value="PLANNER">PLANNER</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label>BAY-1 (TO)</label>
                    <div id="listBay1" class="email-list-container"></div>
                    <div class="email-input-row">
                        <input type="email" id="inBay1" placeholder="e-posta adresi...">
                        <button class="add-btn" onclick="addEmailFromUI('bay1To','inBay1')">+</button>
                    </div>
                </div>
                <div class="setting-item">
                    <label>BAY-2 (TO)</label>
                    <div id="listBay2" class="email-list-container"></div>
                    <div class="email-input-row">
                        <input type="email" id="inBay2" placeholder="e-posta adresi...">
                        <button class="add-btn" onclick="addEmailFromUI('bay2To','inBay2')">+</button>
                    </div>
                </div>
                <div class="setting-item">
                    <label>BAY-3 (TO)</label>
                    <div id="listBay3" class="email-list-container"></div>
                    <div class="email-input-row">
                        <input type="email" id="inBay3" placeholder="e-posta adresi...">
                        <button class="add-btn" onclick="addEmailFromUI('bay3To','inBay3')">+</button>
                    </div>
                </div>
                <div class="setting-item">
                    <label>CC LİSTESİ</label>
                    <div id="listCc" class="email-list-container"></div>
                    <div class="email-input-row">
                        <input type="email" id="inCc" placeholder="e-posta adresi...">
                        <button class="add-btn" onclick="addEmailFromUI('cc','inCc')">+</button>
                    </div>
                </div>
                <button id="btnSaveSettings" class="primary-button" style="background: var(--accent);">KAYDET</button>
            </div>

            <!-- HAKKINDA İçeriği -->
            <div id="panelAbout" class="side-panel-body hidden">
                <div style="text-align: center; padding: 20px 0;">
                    <div style="font-size: 24px; margin-bottom: 8px;">📦</div>
                    <b style="font-size: 13px;">PAKET MAİLCİSİ</b><br>
                    <span style="font-size: 9px; color: var(--text-muted);">v1.2</span>
                    <div style="margin-top: 16px; font-size: 10px; line-height: 1.6; color: var(--text-muted);">
                        BAKIM PAKETLERİ İÇİN<br>OTOMATİK MAİL HAZIRLAMA ARACI
                    </div>
                    <div
                        style="margin-top: 20px; padding-top: 12px; border-top: 1px solid var(--border); font-size: 9px; color: var(--text-muted); line-height: 1.5;">
                        BAKIM PLANLAMA ŞEFLİĞİ (SAW)<br>
                        BAKIM HAZIRLIK BİRİMİ
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="settings.js"></script>
    <script src="app.js"></script>
</body>

</html>
