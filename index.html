<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pack Mailler</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
</head>
<body>
    <div id="container" class="container">
        <div id="warningBar" class="warning-bar hidden">
            <span style="font-size: 16px;">⚠️</span>
            <div>DİKKAT: GÖNDERİCİ HESABI OLARAK <b style="color: var(--accent);">TT-UBB(SAW)-BAKIMHAZIRLIK</b> SEÇİLMELİDİR!</div>
        </div>

        <header class="header">
            <h1>Pack Mailler</h1>
            <button id="btnSettings" class="icon-button" title="Ayarlar">⚙️</button>
        </header>

        <main>
            <section class="section">
                <div style="display: flex; gap: 10px;">
                    <div style="flex: 1;">
                        <label class="section-title">BAY</label>
                        <div class="radio-group">
                            <label class="radio-container"><input type="radio" name="bay" value="BAY-1" checked><span>1</span></label>
                            <label class="radio-container"><input type="radio" name="bay" value="BAY-2"><span>2</span></label>
                            <label class="radio-container"><input type="radio" name="bay" value="BAY-3"><span>3</span></label>
                        </div>
                    </div>
                </div>
            </section>

            <section class="section">
                <label class="section-title">BAKIM TİPİ</label>
                <div class="radio-stack">
                    <label class="radio-container"><input type="radio" name="type" value="planned" checked><span>PLANLI BAKIM</span></label>
                    <label class="radio-container"><input type="radio" name="type" value="unplanned"><span>PLANSIZ / PERİYODİK</span></label>
                </div>
            </section>

            <section class="section">
                <div class="input-field"><label>UÇAK (A/C)</label><input type="text" id="txtAc" placeholder="TC-LLL"></div>
                <div class="input-field"><label>BAKIM ADI</label><input type="text" id="txtBakim" placeholder="A-CHECK"></div>
                <div class="input-field"><label>TARİH</label><input type="date" id="dateInput"></div>
            </section>

            <section id="skillSection" class="section">
                <label class="section-title">SKILL SEÇİMİ</label>
                <div id="skillGrid" class="checkbox-grid">
                    <label class="check-container"><input type="checkbox" id="chk30" checked><span>30-MEK</span></label>
                    <label class="check-container"><input type="checkbox" id="chk35" checked><span>35-KAB</span></label>
                    <label class="check-container"><input type="checkbox" id="chk40" checked><span>40-AVİ</span></label>
                    <label class="check-container"><input type="checkbox" id="chk51" checked><span>51-YAP</span></label>
                    <label class="check-container"><input type="checkbox" id="chk52" checked><span>52-BOY</span></label>
                    <label class="check-container"><input type="checkbox" id="chk53" checked><span>53-KOL</span></label>
                    <label class="check-container"><input type="checkbox" id="chk98" checked><span>98-BOR</span></label>
                    <label class="check-container"><input type="checkbox" id="chk99" checked><span>99-NDT</span></label>
                </div>
                <div id="plannerNote" class="info-note hidden">PLANNER modu aktif.</div>
            </section>

            <div style="margin-top: 10px;">
                <button id="btnPrepare" class="primary-button">MAİL HAZIRLA</button>
            </div>
        </main>

        <div id="settingsOverlay" class="overlay hidden">
            <div class="modal">
                <header class="modal-header">
                    <h2 style="font-size: 11px; margin: 0;">Ayarlar</h2>
                    <button id="btnCloseSettings" class="icon-button" style="color: white;">✕</button>
                </header>
                <div class="modal-body">
                    <div class="setting-item">
                        <label>Zimmet Modu</label>
                        <select id="selZimmetMode"><option value="BIRIM">BİRİM</option><option value="PLANNER">PLANNER</option></select>
                    </div>
                    <div class="setting-item">
                        <label>BAY-1 (TO)</label>
                        <div id="listBay1" class="email-list-container"></div>
                        <input type="email" id="inBay1" placeholder="Ekle...">
                    </div>
                    <div class="setting-item">
                        <label>BAY-2 (TO)</label>
                        <div id="listBay2" class="email-list-container"></div>
                        <input type="email" id="inBay2" placeholder="Ekle...">
                    </div>
                    <div class="setting-item">
                        <label>BAY-3 (TO)</label>
                        <div id="listBay3" class="email-list-container"></div>
                        <input type="email" id="inBay3" placeholder="Ekle...">
                    </div>
                    <div class="setting-item">
                        <label>CC LİSTESİ</label>
                        <div id="listCc" class="email-list-container"></div>
                        <input type="email" id="inCc" placeholder="Ekle...">
                    </div>
                    <button id="btnSaveSettings" class="primary-button">KAYDET</button>
                </div>
            </div>
        </div>
    </div>
    <script src="settings.js"></script>
    <script src="app.js"></script>
</body>
</html>
